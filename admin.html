  <!-- Lucide Icons -->

  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-cinema-black text-cinema-light font-body antialiased;
      }
      h1, h2, h3, h4, h5, h6 {
        @apply font-display;
      }
    }
    @layer components {
      .section-padding {
        @apply px-4 sm:px-6 lg:px-8 xl:px-12;
      }
      .gold-gradient-text {
        @apply bg-clip-text text-transparent bg-gradient-to-r from-cinema-gold to-cinema-gold-light;
      }
      .glass-card {
        @apply bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl;
      }
      .admin-input {
        @apply w-full bg-cinema-darker border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-cinema-gray/50 focus:border-cinema-gold focus:outline-none transition-colors;
      }
      .admin-label {
        @apply block text-sm text-cinema-gray mb-1.5 font-medium;
      }
      .admin-btn {
        @apply px-5 py-2.5 rounded-lg font-medium text-sm transition-all duration-200 cursor-pointer;
      }
      .admin-btn-primary {
        @apply bg-cinema-gold text-cinema-black hover:bg-cinema-gold-light;
      }
      .admin-btn-danger {
        @apply bg-cinema-red/20 text-cinema-red hover:bg-cinema-red/30 border border-cinema-red/30;
      }
      .admin-btn-ghost {
        @apply bg-white/5 text-cinema-gray hover:bg-white/10 hover:text-white border border-white/10;
      }
      .sidebar-link {
        @apply flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all duration-200 cursor-pointer;
      }
      .sidebar-link-active {
        @apply bg-cinema-gold/15 text-cinema-gold;
      }
      .sidebar-link-inactive {
        @apply text-cinema-gray hover:bg-white/5 hover:text-white;
      }
    }
    .toast-enter {
      animation: toastIn 0.3s ease-out forwards;
    }
    .toast-exit {
      animation: toastOut 0.3s ease-out forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-20px); }
    }
    .modal-overlay {
      animation: fadeIn 0.2s ease-out forwards;
    }
    .modal-content {
      animation: modalIn 0.3s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    /* 图片管理 - 进度条 */
    .upload-progress-bar { transition: width 0.3s ease; }
    /* 内联编辑 */
    .inline-edit-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 4px;
      padding: 2px 8px;
      color: #fff;
      outline: none;
      width: 100%;
      font-size: 13px;
    }
    .inline-edit-input:focus { border-color: rgba(212,175,55,0.6); }
    .editable-field { cursor: pointer; border-radius: 4px; padding: 2px 6px; transition: background 0.2s; }
    .editable-field:hover { background: rgba(255,255,255,0.08); }
    /* 图片选择复选框 */
    .img-checkbox {
      position: absolute; top: 8px; left: 8px; z-index: 10;
      width: 20px; height: 20px; accent-color: #d4af37;
    }
    /* 列表视图 */
    .list-row { transition: background 0.2s; }
    .list-row:hover { background: rgba(255,255,255,0.03); }
  </style>
</head>

    // ==================== 初始化数据 ====================
    function initData() {
      if (!DB.get('works')) DB.set('works', DEFAULT_DATA.works);
      if (!DB.get('timeline')) DB.set('timeline', DEFAULT_DATA.timeline);
      if (!DB.get('settings')) DB.set('settings', DEFAULT_DATA.settings);
      if (!DB.get('account')) DB.set('account', DEFAULT_DATA.account);
      if (!DB.get('images')) DB.set('images', DEFAULT_DATA.images);
    }
    initData();

    // ==================== 认证 ====================
    function isLoggedIn() {
      return sessionStorage.getItem('crystal_admin_session') === 'true';
    }
    function login(username, password) {
      const account = DB.get('account', DEFAULT_DATA.account);
      if (username === account.username && password === account.password) {
        sessionStorage.setItem('crystal_admin_session', 'true');
        return true;
      }
      return false;
    }
    function logout() {
      sessionStorage.removeItem('crystal_admin_session');
      location.reload();
    }

    // ==================== Toast 通知 ====================
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const colors = {
        success: 'bg-cinema-green/20 border-cinema-green/40 text-cinema-green',
        error: 'bg-cinema-red/20 border-cinema-red/40 text-cinema-red',
        info: 'bg-cinema-gold/20 border-cinema-gold/40 text-cinema-gold',
      };
      const icons = { success: 'check-circle', error: 'x-circle', info: 'info' };
      toast.className = `toast-enter flex items-center gap-3 px-5 py-3 rounded-lg border ${colors[type]} backdrop-blur-md text-sm font-medium min-w-[260px]`;
      toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5"></i><span>${message}</span>`;
      container.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => {
        toast.classList.remove('toast-enter');
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // ==================== 模态框 ====================
    function openModal(html) {
      const container = document.getElementById('modal-container');
      const content = document.getElementById('modal-content');
      content.innerHTML = html;
      container.classList.remove('hidden');
      lucide.createIcons();
    }
    function closeModal() {
      document.getElementById('modal-container').classList.add('hidden');
    }
    document.getElementById('modal-overlay').addEventListener('click', closeModal);

    // ==================== 页面渲染 ====================
    const PAGES = {
      dashboard: { title: '数据看板', render: renderDashboard },
      works: { title: '作品管理', render: renderWorks },
      timeline: { title: '演艺历程', render: renderTimeline },
      settings: { title: '站点设置', render: renderSettings },
      images: { title: '图片管理', render: renderImages },
      account: { title: '账户管理', render: renderAccount },
      data: { title: '数据管理', render: renderData },
    };

    let currentPage = 'dashboard';

    function navigateTo(page) {
      currentPage = page;
      // 更新侧边栏
      document.querySelectorAll('.sidebar-link[data-page]').forEach(link => {
        if (link.dataset.page === page) {
          link.classList.remove('sidebar-link-inactive');
          link.classList.add('sidebar-link-active');
        } else {
          link.classList.remove('sidebar-link-active');
          link.classList.add('sidebar-link-inactive');
        }
      });
      // 更新标题
      document.getElementById('page-title').textContent = PAGES[page].title;
      // 渲染内容
      document.getElementById('page-content').innerHTML = PAGES[page].render();
      lucide.createIcons();
      // 关闭移动端侧边栏
      closeSidebar();
    }

    document.querySelectorAll('.sidebar-link[data-page]').forEach(link => {
      link.addEventListener('click', () => navigateTo(link.dataset.page));
    });

    // ==================== 数据看板 ====================
    function renderDashboard() {
      const works = DB.get('works', []);
      const timeline = DB.get('timeline', []);
      const settings = DB.get('settings', {});
      const images = DB.get('images', []);
      const movies = works.filter(w => w.type === 'movie').length;
      const tvShows = works.filter(w => w.type === 'tv').length;

      return `
        <div class="space-y-6">
          <!-- 统计卡片 -->
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="glass-card p-6">

    // ==================== 作品封面上传 ====================
    function handleWorkCoverDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('border-cinema-gold', 'bg-white/[0.05]');
    }
    function handleWorkCoverDragLeave(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('border-cinema-gold', 'bg-white/[0.05]');
    }
    function handleWorkCoverDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('border-cinema-gold', 'bg-white/[0.05]');
      const files = e.dataTransfer.files;
      if (files.length > 0 && files[0].type.startsWith('image/')) {
        uploadWorkCover(files[0]);
      } else {
        showToast('请拖拽图片文件', 'error');
      }
    }
    function handleWorkCoverSelect(input) {
      if (input.files.length > 0) {
        uploadWorkCover(input.files[0]);
        input.value = '';
      }
    }
    function updateWorkCoverPreview(path) {
      const previewWrap = document.getElementById('work-cover-preview-wrap');
      const placeholder = document.getElementById('work-cover-placeholder');
      if (!path) {
        if (previewWrap) previewWrap.classList.add('hidden');
        if (placeholder) placeholder.classList.remove('hidden');
        return;
      }
      document.getElementById('work-cover-preview').src = path;
      if (previewWrap) previewWrap.classList.remove('hidden');
      if (placeholder) placeholder.classList.add('hidden');
    }
    async function uploadWorkCover(file) {
      const placeholder = document.getElementById('work-cover-placeholder');
      const uploading = document.getElementById('work-cover-uploading');
      const previewWrap = document.getElementById('work-cover-preview-wrap');
      if (placeholder) placeholder.classList.add('hidden');
      if (previewWrap) previewWrap.classList.add('hidden');
      if (uploading) uploading.classList.remove('hidden');
      if (window.lucide) lucide.createIcons();
      try {
        const ext = file.name.split('.').pop().toLowerCase();
        const filename = 'work_' + Date.now() + '.' + ext;
        await uploadSingleToGitHub(file, filename);
        // 上传成功，保存图片记录
        const images = DB.get('images', []);
        const maxId = images.reduce((m, i) => Math.max(m, i.id || 0), 0);
        const record = {
          id: maxId + 1, name: filename, path: 'images/' + filename,
          desc: '作品封面', category: '剧照', date: '', location: '', author: '',
          uploadedAt: new Date().toISOString().split('T')[0],
        };
        const existingIdx = images.findIndex(i => i.name === filename);
        if (existingIdx >= 0) { record.id = images[existingIdx].id; images[existingIdx] = record; }
        else { images.push(record); }
        DB.set('images', images);
        // 更新预览和下拉
        const select = document.getElementById('work-image');
        const opt = document.createElement('option');
        opt.value = record.path;
        opt.textContent = record.name + ' - 作品封面';
        opt.selected = true;
        select.insertBefore(opt, select.firstChild);
        if (uploading) uploading.classList.add('hidden');
        if (previewWrap) {
          document.getElementById('work-cover-preview').src = record.path;
          previewWrap.classList.remove('hidden');
        }
        if (window.lucide) lucide.createIcons();
        showToast('封面上传成功，已自动选中', 'success');
      } catch (err) {
        if (uploading) uploading.classList.add('hidden');
        if (placeholder) placeholder.classList.remove('hidden');
        if (window.lucide) lucide.createIcons();
        showToast('封面上传失败：' + err.message, 'error');
      }
    }

      else { startBatchUpload(files); }

    // ==================== 批量上传 ====================
    async function startBatchUpload(files) {
      const cfg = getGitHubConfig();
      if (!cfg.token || !cfg.user || !cfg.repo) {
        showToast('请先在站点设置中配置 GitHub 信息', 'error'); return;
      }
      const area = document.getElementById('upload-progress-area');
      area.classList.remove('hidden');

      // 初始化进度 UI
      const items = files.map((f, i) => ({ file: f, index: i, status: 'pending', progress: 0, preview: null, error: null }));
      
      // 生成缩略图预览
      for (const item of items) {
        item.preview = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(item.file);
        });
      }

      renderUploadProgress(items);
      if (window.lucide) lucide.createIcons();

      // 逐个上传
      for (const item of items) {
        item.status = 'uploading';
        renderUploadProgress(items);
        try {
          const ext = item.file.name.split('.').pop().toLowerCase();
          const filename = item.file.name.replace(/\.[^.]+$/, '').replace(/[^\w\u4e00-\u9fa5-]/g, '_') + '.' + ext;
          await uploadSingleToGitHub(item.file, filename);
          item.status = 'done'; item.progress = 100;
        } catch (err) {
          item.status = 'error'; item.error = err.message;
        }
        renderUploadProgress(items);
        if (window.lucide) lucide.createIcons();
      }

      // 全部完成
      const successCount = items.filter(i => i.status === 'done').length;
      const failCount = items.filter(i => i.status === 'error').length;
      showToast(`上传完成：成功 ${successCount} 张${failCount > 0 ? '，失败 ' + failCount + ' 张' : ''}`, failCount > 0 ? 'error' : 'success');
      
      setTimeout(() => { area.classList.add('hidden'); navigateTo('images'); }, 2000);
    }

    function renderUploadProgress(items) {
      const area = document.getElementById('upload-progress-area');
      if (!area) return;
      const total = items.length;
      const done = items.filter(i => i.status === 'done').length;
      const overallPct = Math.round(done / total * 100);
      area.innerHTML = `
        <div class="flex items-center justify-between mb-3">

        </div>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3 max-h-60 overflow-y-auto">
          ${items.map(item => `
            <div class="flex items-center gap-3 p-2 rounded-lg bg-white/[0.03]">
              ${item.preview ? `<img src="${item.preview}" class="w-10 h-10 rounded object-cover flex-shrink-0">` : '<div class="w-10 h-10 rounded bg-white/5 flex-shrink-0"></div>'}

                <p class="text-white text-xs truncate">${item.file.name}</p>

    // ==================== 单张上传预览模态框 ====================
    function openImageUploadModal(file) {
      pendingImageFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {

        const fileSizeKB = (file.size / 1024).toFixed(1);
        const fileSizeStr = fileSizeKB > 1024 ? (fileSizeKB / 1024).toFixed(2) + ' MB' : fileSizeKB + ' KB';
        const ext = file.name.split('.').pop().toLowerCase();
        const defaultName = file.name.replace(/\.[^.]+$/, '').replace(/[^\w\u4e00-\u9fa5-]/g, '_') + '.' + ext;

        openModal(`
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-display font-bold text-white">上传图片到云端</h3>
            <button onclick="closeModal()" class="text-cinema-gray hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>
          <div class="mb-5">
            <div class="rounded-xl overflow-hidden bg-cinema-darker border border-white/10 max-h-80 flex items-center justify-center">
              <img src="${previewUrl}" alt="预览" class="max-w-full max-h-80 object-contain">
            </div>
            <div class="flex items-center gap-4 mt-3 text-xs text-cinema-gray">
              <span class="flex items-center gap-1"><i data-lucide="file-image" class="w-3.5 h-3.5"></i> ${file.name}</span>
              <span class="flex items-center gap-1"><i data-lucide="hard-drive" class="w-3.5 h-3.5"></i> ${fileSizeStr}</span>
              <span class="flex items-center gap-1 text-cinema-gold"><i data-lucide="eye" class="w-3.5 h-3.5"></i> 本地预览中</span>
            </div>
          </div>
          <form id="image-upload-form" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div><label class="admin-label">云端文件名</label><input type="text" id="upload-filename" class="admin-input" value="${defaultName}" required></div>
              <div><label class="admin-label">分类</label><input type="text" id="upload-category" class="admin-input" placeholder="如：剧照、写真、海报"></div>
              <div><label class="admin-label">描述</label><input type="text" id="upload-desc" class="admin-input" placeholder="图片用途说明"></div>
              <div><label class="admin-label">拍摄日期</label><input type="text" id="upload-date" class="admin-input" placeholder="如：2024-06-08"></div>
              <div><label class="admin-label">地点</label><input type="text" id="upload-location" class="admin-input" placeholder="如：北京"></div>
              <div><label class="admin-label">作者</label><input type="text" id="upload-author" class="admin-input" placeholder="如：官方"></div>
            </div>
            <div class="flex justify-end gap-3 pt-2">
              <button type="button" onclick="closeModal()" class="admin-btn admin-btn-ghost">取消</button>
              <button type="submit" id="upload-btn" class="admin-btn admin-btn-primary flex items-center gap-2"><i data-lucide="cloud-upload" class="w-4 h-4"></i><span>确认上传到云端</span></button>
            </div>
          </form>
        `);

        document.getElementById('image-upload-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          await uploadImageToGitHub();
        });
      };
      reader.readAsDataURL(file);
    }

    // ==================== 上传到 GitHub ====================
    async function uploadSingleToGitHub(file, filename, extraFields = {}) {
      const cfg = getGitHubConfig();
      if (!cfg.token || !cfg.user || !cfg.repo) throw new Error('未配置 GitHub');
      const base64 = await fileToBase64(file);
      const path = 'images/' + filename;
      const apiURL = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`;
      let sha = null;
      try {
        const checkRes = await fetch(apiURL, { headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' } });
        if (checkRes.ok) { sha = (await checkRes.json()).sha; }
      } catch(e) {}
      const body = { message: sha ? `Update image: ${filename}` : `Upload image: ${filename}`, content: base64 };
      if (sha) body.sha = sha;
      const res = await fetch(apiURL, { method: 'PUT', headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || '上传失败');
      return 'images/' + filename;
    }

    async function uploadImageToGitHub() {
      const filename = document.getElementById('upload-filename').value.trim();
      const cfg = getGitHubConfig();
      if (!cfg.token || !cfg.user || !cfg.repo) { showToast('请先配置 GitHub 信息', 'error'); return; }
      if (!pendingImageFile) { showToast('没有待上传的图片', 'error'); return; }
      const btn = document.getElementById('upload-btn');
      const btnHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>上传中...</span>';
      if (window.lucide) lucide.createIcons();
      try {
        await uploadSingleToGitHub(pendingImageFile, filename);
        const images = DB.get('images', []);
        const maxId = images.reduce((m, i) => Math.max(m, i.id || 0), 0);
        const record = {
          id: maxId + 1, name: filename, path: 'images/' + filename,
          desc: document.getElementById('upload-desc').value.trim(),
          category: document.getElementById('upload-category').value.trim() || '未分类',
          date: document.getElementById('upload-date').value.trim(),
          location: document.getElementById('upload-location').value.trim(),
          author: document.getElementById('upload-author').value.trim(),
          uploadedAt: new Date().toISOString().split('T')[0],
        };
        const existingIdx = images.findIndex(i => i.name === filename);
        if (existingIdx >= 0) { record.id = images[existingIdx].id; images[existingIdx] = record; }
        else { images.push(record); }
        DB.set('images', images);
        pendingImageFile = null;
        closeModal(); navigateTo('images');
        showToast('图片已上传到云端并保存记录', 'success');
      } catch (err) {
        btn.disabled = false; btn.innerHTML = btnHtml;
        if (window.lucide) lucide.createIcons();
        showToast('上传失败：' + err.message, 'error');
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ==================== 编辑/删除 ====================
    function deleteImage(id) {
      openModal(`
        <div class="text-center">
          <div class="w-16 h-16 mx-auto rounded-full bg-cinema-red/20 flex items-center justify-center mb-4"><i data-lucide="alert-triangle" class="w-8 h-8 text-cinema-red"></i></div>
          <h3 class="text-xl font-display font-bold text-white mb-2">确认删除</h3>
          <p class="text-cinema-gray text-sm mb-6">删除图片记录（不会删除云端文件），确定吗？</p>

            <button onclick="closeModal()" class="admin-btn admin-btn-ghost">取消</button>
            <button onclick="confirmDeleteImage(${id})" class="admin-btn admin-btn-danger">确认删除</button>
          </div>
        </div>
      `);
    }
    function confirmDeleteImage(id) {
      let images = DB.get('images', []);
      images = images.filter(i => i.id !== id);
      DB.set('images', images);
      imgState.selectedIds = imgState.selectedIds.filter(i => i !== id);
      closeModal(); navigateTo('images');
      showToast('图片记录已删除', 'info');
    }

    // ==================== 账户管理 ====================
    function renderAccount() {
      const account = DB.get('account', {});
      return `

          <div class="glass-card p-6 space-y-4">
            <h3 class="text-lg font-display font-bold text-white mb-2">修改账户信息</h3>
            <div>
              <label class="admin-label">用户名</label>
              <input type="text" id="acc-username" class="admin-input" value="${account.username}" required>
            </div>
            <div>
              <label class="admin-label">当前密码</label>
              <input type="password" id="acc-current-pwd" class="admin-input" placeholder="请输入当前密码">
            </div>
            <div>
              <label class="admin-label">新密码</label>

            </div>
            <div>
              <label class="admin-label">确认新密码</label>
              <input type="password" id="acc-confirm-pwd" class="admin-input" placeholder="再次输入新密码">
            </div>
          </div>
          <div class="flex justify-end">
            <button type="submit" class="admin-btn admin-btn-primary flex items-center gap-2">
              <i data-lucide="save" class="w-4 h-4"></i> 保存修改
            </button>
          </div>
        </form>
      `;
    }

    document.addEventListener('submit', (e) => {
      if (e.target.id === 'account-form') {
        e.preventDefault();
        const account = DB.get('account', {});
        const username = document.getElementById('acc-username').value;
        const currentPwd = document.getElementById('acc-current-pwd').value;
        const newPwd = document.getElementById('acc-new-pwd').value;
        const confirmPwd = document.getElementById('acc-confirm-pwd').value;

        if (newPwd || confirmPwd) {
          if (currentPwd !== account.password) {
            showToast('当前密码不正确', 'error');
            return;
          }
          if (newPwd !== confirmPwd) {
            showToast('两次输入的新密码不一致', 'error');
            return;
          }
          if (newPwd.length < 6) {
            showToast('新密码至少 6 位', 'error');
            return;
          }
          account.password = newPwd;
        }
        account.username = username;
        DB.set('account', account);
        showToast('账户信息已更新');
      }
    });

    // ==================== 数据管理 ====================
    function renderData() {
      return `
        <div class="space-y-6 max-w-3xl">
          <div class="glass-card p-6">
            <h3 class="text-lg font-display font-bold text-white mb-2">导出数据</h3>
            <p class="text-cinema-gray text-sm mb-4">将当前所有管理数据导出为 JSON 文件，可用于备份或迁移。</p>
            <button onclick="exportData()" class="admin-btn admin-btn-primary flex items-center gap-2">
              <i data-lucide="download" class="w-4 h-4"></i> 导出全部数据
            </button>
          </div>

          <div class="glass-card p-6">
            <h3 class="text-lg font-display font-bold text-white mb-2">导入数据</h3>
            <p class="text-cinema-gray text-sm mb-4">从 JSON 文件导入数据，将覆盖当前所有管理数据。</p>
            <input type="file" id="import-file" accept=".json" class="hidden">
            <button onclick="document.getElementById('import-file').click()" class="admin-btn admin-btn-ghost flex items-center gap-2">
              <i data-lucide="upload" class="w-4 h-4"></i> 选择 JSON 文件
            </button>
          </div>

          <div class="glass-card p-6 border-cinema-red/20">
            <h3 class="text-lg font-display font-bold text-cinema-red mb-2">重置数据</h3>
            <p class="text-cinema-gray text-sm mb-4">将所有数据恢复到初始默认状态，此操作不可撤销。</p>
            <button onclick="resetData()" class="admin-btn admin-btn-danger flex items-center gap-2">
              <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重置为默认数据
            </button>
          </div>

          <div class="glass-card p-6">
            <h3 class="text-lg font-display font-bold text-white mb-4">当前数据预览</h3>
            <div class="space-y-2 text-sm">
              <div class="flex justify-between py-2 border-b border-white/5">
                <span class="text-cinema-gray">作品数据</span>
                <span class="text-white">${DB.get('works', []).length} 条</span>
              </div>
              <div class="flex justify-between py-2 border-b border-white/5">
                <span class="text-cinema-gray">历程数据</span>
                <span class="text-white">${DB.get('timeline', []).length} 条</span>
              </div>
              <div class="flex justify-between py-2 border-b border-white/5">
                <span class="text-cinema-gray">图片记录</span>
                <span class="text-white">${DB.get('images', []).length} 条</span>
              </div>
              <div class="flex justify-between py-2">
                <span class="text-cinema-gray">站点设置</span>
                <span class="text-cinema-green">已配置</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function exportData() {
      const data = {
        exportTime: new Date().toISOString(),
        works: DB.get('works', []),
        timeline: DB.get('timeline', []),
        settings: DB.get('settings', {}),
        images: DB.get('images', []),
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `crystal-admin-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('数据已导出');
    }

    document.getElementById('import-file')?.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.works) DB.set('works', data.works);
          if (data.timeline) DB.set('timeline', data.timeline);
          if (data.settings) DB.set('settings', data.settings);
          if (data.images) DB.set('images', data.images);
          showToast('数据导入成功');
          navigateTo('data');
        } catch {
          showToast('文件格式错误', 'error');
        }
      };
      reader.readAsText(file);
    });

    // Use event delegation for file input
    document.addEventListener('change', (e) => {
      if (e.target.id === 'import-file') {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.works) DB.set('works', data.works);
            if (data.timeline) DB.set('timeline', data.timeline);
            if (data.settings) DB.set('settings', data.settings);
            if (data.images) DB.set('images', data.images);
            showToast('数据导入成功');
            navigateTo('data');
          } catch {
            showToast('文件格式错误', 'error');
          }
        };
        reader.readAsText(file);
      }
    });

    function resetData() {
      openModal(`
        <div class="text-center">
          <div class="w-16 h-16 mx-auto rounded-full bg-cinema-red/20 flex items-center justify-center mb-4">
            <i data-lucide="alert-triangle" class="w-8 h-8 text-cinema-red"></i>
          </div>
          <h3 class="text-xl font-display font-bold text-white mb-2">确认重置</h3>
          <p class="text-cinema-gray text-sm mb-6">所有数据将恢复到初始状态，当前修改将丢失。确定继续吗？</p>
          <div class="flex justify-center gap-3">
            <button onclick="closeModal()" class="admin-btn admin-btn-ghost">取消</button>
            <button onclick="confirmResetData()" class="admin-btn admin-btn-danger">确认重置</button>
          </div>
        </div>
      `);
    }
    function confirmResetData() {
      DB.set('works', DEFAULT_DATA.works);
      DB.set('timeline', DEFAULT_DATA.timeline);
      DB.set('settings', DEFAULT_DATA.settings);
      DB.set('images', DEFAULT_DATA.images);
      closeModal();
      navigateTo('data');
      showToast('数据已重置为默认状态', 'info');

    // ==================== 侧边栏移动端 ====================
    const sidebar = document.getElementById('sidebar');

      sidebarOverlay.classList.remove('hidden');

      if (window.innerWidth < 1024) {
        sidebar.classList.add('-translate-x-full');
        sidebarOverlay.classList.add('hidden');
      }

    // ==================== 登录逻辑 ====================
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      } else {
        errorEl.textContent = '用户名或密码错误，请重试';
        errorEl.classList.remove('hidden');

    });

    document.getElementById('logout-btn').addEventListener('click', logout);

    // ==================== 显示管理面板 ====================
    function showAdmin() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('admin-panel').classList.remove('hidden');
      navigateTo('dashboard');
      lucide.createIcons();
    }

    // ==================== 时间显示 ====================
    function updateTime() {
      const el = document.getElementById('current-time');
      if (el) {
        const now = new Date();
        el.textContent = now.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      }
    }
    setInterval(updateTime, 60000);
    updateTime();

    // ==================== 启动 ====================
    if (isLoggedIn()) {
      showAdmin();
    }
  </script>
</body>
