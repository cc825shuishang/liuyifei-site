  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-cinema-black text-cinema-light font-body antialiased;
      }
      h1, h2, h3, h4, h5, h6 {
        @apply font-display;
      }
    }
    @layer components {
      .section-padding {
        @apply px-4 sm:px-6 lg:px-8 xl:px-12;
      }
      .gold-gradient-text {
        @apply bg-clip-text text-transparent bg-gradient-to-r from-cinema-gold to-cinema-gold-light;
      }
      .glass-card {
        @apply bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl;
      }
      .admin-input {
        @apply w-full bg-cinema-darker border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-cinema-gray/50 focus:border-cinema-gold focus:outline-none transition-colors;
      }
      .admin-label {
        @apply block text-sm text-cinema-gray mb-1.5 font-medium;
      }
      .admin-btn {
        @apply px-5 py-2.5 rounded-lg font-medium text-sm transition-all duration-200 cursor-pointer;
      }
      .admin-btn-primary {
        @apply bg-cinema-gold text-cinema-black hover:bg-cinema-gold-light;
      }
      .admin-btn-danger {
        @apply bg-cinema-red/20 text-cinema-red hover:bg-cinema-red/30 border border-cinema-red/30;
      }
      .admin-btn-ghost {
        @apply bg-white/5 text-cinema-gray hover:bg-white/10 hover:text-white border border-white/10;
      }
      .sidebar-link {
        @apply flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all duration-200 cursor-pointer;
      }
      .sidebar-link-active {
        @apply bg-cinema-gold/15 text-cinema-gold;
      }
      .sidebar-link-inactive {
        @apply text-cinema-gray hover:bg-white/5 hover:text-white;
      }
    }
    .toast-enter {
      animation: toastIn 0.3s ease-out forwards;
    }
    .toast-exit {
      animation: toastOut 0.3s ease-out forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-20px); }
    }
    .modal-overlay {
      animation: fadeIn 0.2s ease-out forwards;
    }
    .modal-content {
      animation: modalIn 0.3s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    // ==================== 初始化数据 ====================
    function initData() {
      if (!DB.get('works')) DB.set('works', DEFAULT_DATA.works);
      if (!DB.get('timeline')) DB.set('timeline', DEFAULT_DATA.timeline);
      if (!DB.get('settings')) DB.set('settings', DEFAULT_DATA.settings);
      if (!DB.get('account')) DB.set('account', DEFAULT_DATA.account);
      if (!DB.get('images')) DB.set('images', DEFAULT_DATA.images);
    }
    initData();

    // ==================== 认证 ====================
    function isLoggedIn() {
      return sessionStorage.getItem('crystal_admin_session') === 'true';
    }
    function login(username, password) {
      const account = DB.get('account', DEFAULT_DATA.account);
      if (username === account.username && password === account.password) {
        sessionStorage.setItem('crystal_admin_session', 'true');
        return true;
      }
      return false;
    }
    function logout() {
      sessionStorage.removeItem('crystal_admin_session');
      location.reload();
    }

    // ==================== Toast 通知 ====================
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const colors = {
        success: 'bg-cinema-green/20 border-cinema-green/40 text-cinema-green',
        error: 'bg-cinema-red/20 border-cinema-red/40 text-cinema-red',
        info: 'bg-cinema-gold/20 border-cinema-gold/40 text-cinema-gold',
      };
      const icons = { success: 'check-circle', error: 'x-circle', info: 'info' };
      toast.className = `toast-enter flex items-center gap-3 px-5 py-3 rounded-lg border ${colors[type]} backdrop-blur-md text-sm font-medium min-w-[260px]`;
      toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5"></i><span>${message}</span>`;
      container.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => {
        toast.classList.remove('toast-enter');
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // ==================== 模态框 ====================
    function openModal(html) {
      const container = document.getElementById('modal-container');
      const content = document.getElementById('modal-content');
      content.innerHTML = html;
      container.classList.remove('hidden');
      lucide.createIcons();
    }
    function closeModal() {
      document.getElementById('modal-container').classList.add('hidden');
    }
    document.getElementById('modal-overlay').addEventListener('click', closeModal);

      works: { title: '作品管理', render: renderWorks },
      timeline: { title: '演艺历程', render: renderTimeline },
      settings: { title: '站点设置', render: renderSettings },
      images: { title: '图片管理', render: renderImages },
      account: { title: '账户管理', render: renderAccount },
      data: { title: '数据管理', render: renderData },
    };

    let currentPage = 'dashboard';

    function navigateTo(page) {
      currentPage = page;
      // 更新侧边栏
      document.querySelectorAll('.sidebar-link[data-page]').forEach(link => {
        if (link.dataset.page === page) {
          link.classList.remove('sidebar-link-inactive');
          link.classList.add('sidebar-link-active');
        } else {
          link.classList.remove('sidebar-link-active');
          link.classList.add('sidebar-link-inactive');
        }
      });
      // 更新标题
      document.getElementById('page-title').textContent = PAGES[page].title;
      // 渲染内容
      document.getElementById('page-content').innerHTML = PAGES[page].render();
      lucide.createIcons();
      // 关闭移动端侧边栏
      closeSidebar();
    }

    document.querySelectorAll('.sidebar-link[data-page]').forEach(link => {
      link.addEventListener('click', () => navigateTo(link.dataset.page));

              </div>
            </div>

            <div class="glass-card p-6">
              <h3 class="text-lg font-display font-bold text-white mb-4">作品类型分布</h3>

    function openWorkModal(id) {
      const works = DB.get('works', []);

      const images = DB.get('images', []);
      openModal(`
        <div class="flex items-center justify-between mb-6">
          <h3 class="text-xl font-display font-bold text-white">${id ? '编辑作品' : '添加作品'}</h3>

        <form id="work-form" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>

              <input type="text" id="work-title" class="admin-input" value="${work.title}" required>
            </div>
            <div>
              <label class="admin-label">年份</label>
              <input type="number" id="work-year" class="admin-input" value="${work.year}" required>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="admin-label">类型</label>
              <select id="work-type" class="admin-input">
                <option value="tv" ${work.type === 'tv' ? 'selected' : ''}>电视剧</option>
                <option value="movie" ${work.type === 'movie' ? 'selected' : ''}>电影</option>
              </select>
            </div>
            <div>
              <label class="admin-label">饰演角色</label>
              <input type="text" id="work-role" class="admin-input" value="${work.role}" required>
            </div>
          </div>
          <div>
            <label class="admin-label">封面图片路径</label>
            <select id="work-image" class="admin-input">
              ${images.map(img => `<option value="${img.path}" ${work.image === img.path ? 'selected' : ''}>${img.name} - ${img.desc}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="admin-label">作品简介</label>
            <textarea id="work-desc" class="admin-input" rows="3" required>${work.desc}</textarea>
          </div>
          <div class="flex justify-end gap-3 pt-4">
            <button type="button" onclick="closeModal()" class="admin-btn admin-btn-ghost">取消</button>
            <button type="submit" class="admin-btn admin-btn-primary">${id ? '保存修改' : '添加'}</button>
          </div>
        </form>
      `);
      document.getElementById('work-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const data = {
          id: id || Date.now(),
          title: document.getElementById('work-title').value,
          year: parseInt(document.getElementById('work-year').value),
          type: document.getElementById('work-type').value,
          role: document.getElementById('work-role').value,
          image: document.getElementById('work-image').value,
          desc: document.getElementById('work-desc').value,
        };
        const works = DB.get('works', []);
        if (id) {
          const idx = works.findIndex(w => w.id === id);
          works[idx] = data;
        } else {
          works.push(data);
        }
        DB.set('works', works);
        closeModal();
        navigateTo('works');
        showToast(id ? '作品已更新' : '作品已添加');
      });
    }

    function handleDrop(e) {

    // ==================== 上传预览模态框（本地审阅） ====================
    function openImageUploadModal(file) {

      const reader = new FileReader();
      reader.onload = (e) => {

        const fileSizeStr = fileSizeKB > 1024 ? (fileSizeKB / 1024).toFixed(2) + ' MB' : fileSizeKB + ' KB';
        // 生成默认文件名（保留原扩展名）
        const ext = file.name.split('.').pop().toLowerCase();
        const defaultName = file.name.replace(/\.[^.]+$/, '').replace(/[^\w\u4e00-\u9fa5-]/g, '_') + '.' + ext;

        openModal(`
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-display font-bold text-white">上传图片到云端</h3>
            <button onclick="closeModal()" class="text-cinema-gray hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>

          <!-- 本地预览区 -->
          <div class="mb-5">
            <div class="rounded-xl overflow-hidden bg-cinema-darger border border-white/10 max-h-80 flex items-center justify-center">
              <img src="${previewUrl}" alt="预览" class="max-w-full max-h-80 object-contain">
            </div>
            <div class="flex items-center gap-4 mt-3 text-xs text-cinema-gray">
              <span class="flex items-center gap-1"><i data-lucide="file-image" class="w-3.5 h-3.5"></i> ${file.name}</span>
              <span class="flex items-center gap-1"><i data-lucide="hard-drive" class="w-3.5 h-3.5"></i> ${fileSizeStr}</span>
              <span class="flex items-center gap-1 text-cinema-gold"><i data-lucide="eye" class="w-3.5 h-3.5"></i> 本地预览中</span>
            </div>
          </div>

          <!-- 信息填写 -->
          <form id="image-upload-form" class="space-y-4">
            <div>
              <label class="admin-label">云端文件名</label>
              <input type="text" id="upload-filename" class="admin-input" value="${defaultName}" placeholder="例如：newphoto.jpg" required>
              <p class="text-cinema-gray/50 text-xs mt-1">文件将上传到 images/ 目录下</p>
            </div>
            <div>
              <label class="admin-label">图片描述</label>
              <input type="text" id="upload-desc" class="admin-input" placeholder="图片用途说明，例如：新剧照">
            </div>

            <!-- GitHub 配置检查 -->
            <div id="github-config-check" class="hidden rounded-lg bg-cinema-red/10 border border-cinema-red/30 p-3 text-sm text-cinema-red flex items-center gap-2">
              <i data-lucide="alert-triangle" class="w-4 h-4 flex-shrink-0"></i>
              <span>未配置 GitHub Token，请先到「站点设置」填写 GitHub 云端配置。</span>
            </div>

            <div class="flex justify-end gap-3 pt-2">
              <button type="button" onclick="closeModal()" class="admin-btn admin-btn-ghost">取消</button>
              <button type="submit" id="upload-btn" class="admin-btn admin-btn-primary flex items-center gap-2">
                <i data-lucide="cloud-upload" class="w-4 h-4"></i>
                <span>确认上传到云端</span>
              </button>
            </div>
          </form>
        `);

        // 检查 GitHub 配置
        const cfg = getGitHubConfig();
        if (!cfg.token || !cfg.user || !cfg.repo) {
          document.getElementById('github-config-check').classList.remove('hidden');
          document.getElementById('upload-btn').disabled = true;
          document.getElementById('upload-btn').classList.add('opacity-50', 'cursor-not-allowed');
        }

        // 表单提交 → 上传到 GitHub
        document.getElementById('image-upload-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          await uploadImageToGitHub();
        });
      };
      reader.readAsDataURL(file);
    }

    // ==================== 上传图片到 GitHub ====================
    async function uploadImageToGitHub() {
      const filename = document.getElementById('upload-filename').value.trim();
      const desc = document.getElementById('upload-desc').value.trim();
      const cfg = getGitHubConfig();

      if (!cfg.token || !cfg.user || !cfg.repo) {
        showToast('请先在站点设置中配置 GitHub 信息', 'error');
        return;
      }
      if (!pendingImageFile) {
        showToast('没有待上传的图片', 'error');
        return;
      }

      const btn = document.getElementById('upload-btn');
      const btnHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>上传中...</span>';
      if (window.lucide) lucide.createIcons();

      try {
        // 读取文件为 base64
        const base64 = await fileToBase64(pendingImageFile);
        const path = 'images/' + filename;
        const apiURL = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`;

        // 检查文件是否已存在
        let sha = null;
        try {
          const checkRes = await fetch(apiURL, {
            headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' }
          });
          if (checkRes.ok) {
            const checkData = await checkRes.json();
            sha = checkData.sha;
          }
        } catch(e) { /* 文件不存在，忽略 */ }

        // 上传到 GitHub
        const body = {
          message: sha ? `Update image: ${filename}` : `Upload image: ${filename}`,
          content: base64,
        };
        if (sha) body.sha = sha;

        const res = await fetch(apiURL, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${cfg.token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || '上传失败');
        }

        // 上传成功，保存图片记录
        const images = DB.get('images', []);
        const imagePath = 'images/' + filename;
        const existingIdx = images.findIndex(i => i.name === filename);
        const record = { name: filename, path: imagePath, desc: desc };

        if (existingIdx >= 0) {
          images[existingIdx] = record;
        } else {
          images.push(record);
        }
        DB.set('images', images);

        pendingImageFile = null;
        closeModal();
        navigateTo('images');
        showToast('图片已上传到云端并保存记录', 'success');
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = btnHtml;
        if (window.lucide) lucide.createIcons();
        showToast('上传失败：' + err.message, 'error');
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          // 去掉 data:image/xxx;base64, 前缀
          const result = reader.result;
          const base64 = result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ==================== 编辑/删除图片记录 ====================

      const images = DB.get('images', []);

        </div>

            <label class="admin-label">图片名称</label>

    function deleteImage(name) {
      openModal(`
        <div class="text-center">
          <div class="w-16 h-16 mx-auto rounded-full bg-cinema-red/20 flex items-center justify-center mb-4">
            <i data-lucide="alert-triangle" class="w-8 h-8 text-cinema-red"></i>

          <h3 class="text-xl font-display font-bold text-white mb-2">确认删除</h3>
          <p class="text-cinema-gray text-sm mb-6">删除图片记录（不会删除云端文件），确定吗？</p>

    }
    function confirmDeleteImage(name) {
      let images = DB.get('images', []);

      DB.set('images', images);
      closeModal();
      navigateTo('images');
      showToast('图片记录已删除', 'info');

    // ==================== 账户管理 ====================
    function renderAccount() {

        <form id="account-form" class="space-y-6 max-w-lg">

            </div>

              <label class="admin-label">新密码</label>

            </div>
            <div>
              <label class="admin-label">确认新密码</label>

            </div>

          <div class="flex justify-end">

            </button>
          </div>
        </form>
      `;
    }

    document.addEventListener('submit', (e) => {
      if (e.target.id === 'account-form') {
        e.preventDefault();
        const account = DB.get('account', {});
        const username = document.getElementById('acc-username').value;
        const currentPwd = document.getElementById('acc-current-pwd').value;
        const newPwd = document.getElementById('acc-new-pwd').value;
        const confirmPwd = document.getElementById('acc-confirm-pwd').value;

        if (newPwd || confirmPwd) {
          if (currentPwd !== account.password) {
            showToast('当前密码不正确', 'error');
            return;
          }
          if (newPwd !== confirmPwd) {
            showToast('两次输入的新密码不一致', 'error');
            return;
          }
          if (newPwd.length < 6) {
            showToast('新密码至少 6 位', 'error');
            return;
          }
          account.password = newPwd;
        }
        account.username = username;
        DB.set('account', account);
        showToast('账户信息已更新');
      }
    });

    // ==================== 数据管理 ====================
    function renderData() {
      return `
        <div class="space-y-6 max-w-3xl">
          <div class="glass-card p-6">
            <h3 class="text-lg font-display font-bold text-white mb-2">导出数据</h3>

              <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重置为默认数据

                <span class="text-white">${DB.get('works', []).length} 条</span>
              </div>
              <div class="flex justify-between py-2 border-b border-white/5">
                <span class="text-cinema-gray">历程数据</span>
                <span class="text-white">${DB.get('timeline', []).length} 条</span>
              </div>
              <div class="flex justify-between py-2 border-b border-white/5">
                <span class="text-cinema-gray">图片记录</span>
                <span class="text-white">${DB.get('images', []).length} 条</span>
              </div>
              <div class="flex justify-between py-2">
                <span class="text-cinema-gray">站点设置</span>
                <span class="text-cinema-green">已配置</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function exportData() {
      const data = {
        exportTime: new Date().toISOString(),
        works: DB.get('works', []),
        timeline: DB.get('timeline', []),
        settings: DB.get('settings', {}),
        images: DB.get('images', []),
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `crystal-admin-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('数据已导出');
    }

    document.getElementById('import-file')?.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.works) DB.set('works', data.works);
          if (data.timeline) DB.set('timeline', data.timeline);
          if (data.settings) DB.set('settings', data.settings);
          if (data.images) DB.set('images', data.images);
          showToast('数据导入成功');
          navigateTo('data');
        } catch {
          showToast('文件格式错误', 'error');
        }
      };
      reader.readAsText(file);
    });

    // Use event delegation for file input
    document.addEventListener('change', (e) => {
      if (e.target.id === 'import-file') {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.works) DB.set('works', data.works);
            if (data.timeline) DB.set('timeline', data.timeline);
            if (data.settings) DB.set('settings', data.settings);

      sidebarOverlay.classList.remove('hidden');

    // ==================== 时间显示 ====================

        el.textContent = now.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      }
    }
    setInterval(updateTime, 60000);
    updateTime();

    // ==================== 启动 ====================

      showAdmin();
    }
  </script>
